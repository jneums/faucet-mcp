namespace: io.github.jneums.faucet-mcp
submission:
  name: DFINITY Faucet MCP
  description: >-
    Request free test tokens (TESTICP / TICRC1) from the official DFINITY ledger
    faucet via a single MCP tool. No auth required.
  publisher: Jesse Neumann
  category: Developer Tools
  deployment_type: global
  repo_url: https://github.com/jneums/faucet-mcp
  mcp_path: /mcp
  why_this_app: >-
    Makes it trivial for AI agents and developers to obtain test tokens on ICP
    without needing dfx CLI or understanding canister calls. One tool, two token
    types, zero friction.
  key_features:
    - Request TESTICP (ICP test tokens) by principal or account identifier
    - Request TICRC1 (ICRC-1 test tokens) by principal
    - Fully on-chain Motoko canister wrapping the official DFINITY faucet
    - No authentication required — public and free
  tags:
    - faucet
    - tokens
    - testing
    - developer-tools
    - icp
  visuals:
    icon_url: https://github.com/jneums/faucet-mcp/releases/download/v1.0.0-assets/icon-faucet-mcp.png
    banner_url: https://github.com/jneums/faucet-mcp/releases/download/v1.0.0-assets/banner-faucet-mcp.png
    gallery_images: []
  git_commit: 'd47e2f9772b8f62b21d9c4579bfaab1296df88cb'
  wasm_path: .dfx/local/canisters/faucet_mcp/faucet_mcp.wasm
